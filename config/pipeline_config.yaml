# ============================================================
# GeneCompass Rat Fine-Tuning Pipeline Configuration
# ============================================================
# POLICY ONLY — all tunable parameters and paths.
# Mechanism lives in lib/gene_utils.py which reads this file.
#
# Path resolution:
#   All paths are relative to project_root.
#   project_root defaults to "." — override via PIPELINE_ROOT env var.
#
# Usage:
#   import yaml, os
#   with open("config/pipeline_config.yaml") as f:
#       config = yaml.safe_load(f)
#   root = os.environ.get("PIPELINE_ROOT", config["project_root"])

# ============================================================
# Project root (override with PIPELINE_ROOT env var)
# ============================================================
project_root: "."

# ============================================================
# BioMart Reference
# ============================================================
# The canonical rat gene universe is defined as Ensembl BioMart
# (release + assembly below). All pipeline outputs are indexed by
# canonical ENSRNOG IDs from this release. Noncanonical identifiers
# are resolved via deterministic mapping rules; unresolved identifiers
# are excluded with audit logs.
biomart:
  ensembl_release: "113"         # REQUIRED — verified before stage runs
  assembly: "mRatBN7.2"         # REQUIRED
  species: "rattus_norvegicus"
  download_date: "2026-01-15"   # REQUIRED — fill actual date

  # Primary gene annotation (Gene stable ID, Gene name, Gene type, Chr, Desc)
  rat_gene_info: data/references/biomart/rat_gene_info.tsv
  # Optional expected checksum — if set, Stage 2 verifies match.
  # Omit this key until you have the actual hash, then pin it:
  #   rat_gene_info_md5: "a1b2c3d4e5f6..."

  # Supplementary (adds NCBI gene IDs)
  rat_genes_biomart: data/references/biomart/rat_all_genes.tsv

  # Ortholog tables
  rat_human_orthologs: data/references/biomart/rat_human_orthologs.tsv
  rat_mouse_orthologs: data/references/biomart/rat_mouse_orthologs.tsv
  mouse_human_orthologs: data/references/biomart/mouse_human_orthologs.tsv 
# ============================================================
# RGD Reference
# ============================================================
rgd:
  genes_file: data/references/biomart/GENES_RAT.txt
  use_for_biotype_fallback: false
  use_for_symbol_synonyms: true
  require_biomart_resolution: true

# ============================================================
# Data Directories (all relative to project_root)
# ============================================================
paths:
  qc_h5ad_dir: data/training/qc_h5ad
  expected_qc_h5ad_files: 895

  gene_universe_dir: data/training/gene_universe
  ortholog_dir: data/training/ortholog_mappings
  median_dir: data/training/gene_medians
  hybrid_medians: data/training/gene_medians/hybrid_gene_medians.pickle
  reference_dir: data/training/reference_files
  tokenized_corpus_dir: data/training/tokenized_corpus

  motrpac_data_dir: data/motrpac/rat_training_6mo
  motrpac_processed_dir: data/motrpac/processed

  genecompass_dir: vendor/GeneCompass
  genecompass_scdata: vendor/GeneCompass/scdata
  genecompass_medians: vendor/GeneCompass/scdata/dict/human_gene_median_after_filter.pickle
  genecompass_tokens: vendor/GeneCompass/prior_knowledge/human_mouse_tokens.pickle
  genecompass_homologs: vendor/GeneCompass/prior_knowledge/homologous_hm_token.pickle

  prior_knowledge_dir: data/training/prior_knowledge
  hgnc_file: data/references/hgnc/hgnc_complete_set.txt
  rat_genome_fasta: data/references/genome/Rattus_norvegicus.mRatBN7.2.dna.toplevel.fa.gz
  mouse_human_orthologs: data/references/biomart/mouse_human_orthologs.tsv

  models_dir: data/models
  results_dir: data/results

# ============================================================
# Stage 1: Data Harvesting & QC
# ============================================================
harvesting:
  email: "reese18@purdue.edu"
  biomart_server: "https://www.ensembl.org/biomart/martservice"
  rgd_genes_url: "https://download.rgd.mcw.edu/data_release/GENES_RAT.txt"
  biomart_timeout: 600
  fetch_species:
    - rat
    - mouse
    - human
  test_genes:
    - actb
    - gapdh
    - ube2m
    - dhfr
    - gnai3
    - pin1
    - ccl5
    - apoe
    - tp53
    - brca1
    - egfr
    - vegfa
    - il6
    - tnf

  geo_output_dir: data/raw/geo
  geo_metadata_file: geo_metadata.csv
  geo_query: "rattus norvegicus[organism] AND single cell RNA-seq"
  geo_batch_esummary: 400

  arrayexpress_output_dir: data/raw/arrayexpress
  arrayexpress_metadata_file: arrayexpress_metadata.csv

  matrix_staging_dir: data/matrix_staging
  min_cells_per_study: 4
  min_genes_per_cell: 200
  max_mito_fraction: 0.15

  llm_model: "claude-haiku-4-5"
  llm_cost_limit_usd: 5.0
  llm_output_file: data/catalog/llm_study_analysis.json
  llm_debug_dir: data/catalog/debug_responses
  llm_save_responses: false
  llm_rate_limit: 40
  llm_max_tokens: 8192
  llm_filter_organism: "rattus"
  llm_filter_usable: true
  data_root: data/raw
  catalog_file: data/gene_inventory/study_catalog.tsv
  catalog_dir: data/catalog

  sources:
    geo:
      single_cell:
        enabled: true
        path: geo/single_cell/geo_datasets
      bulk:
        enabled: true
        path: geo/bulk/geo_datasets
    arrayexpress:
      single_cell:
        enabled: true
        path: arrayexpress/singlecell/datasets
      bulk:
        enabled: true
        path: arrayexpress/bulk/datasets

  extraction:
    max_files_per_study: 500

# ============================================================
# Stage 2: Gene Universe
# ============================================================
gene_universe:
  # ── Step 1 gene universe construction ──
  biomart_gate: true
  min_biomart_match: 0.30
  match_sample_size: 1000
  match_sample_seed: 0
  min_studies: 2
  keep_biotypes:
    - protein_coding
    - lncrna
    - mirna
  accession_patterns:
    - "^GSE\\d+$"
    - "^E-[A-Z]+-\\d+$"
    - "^E-[A-Z]+-[A-Z]+-\\d+$"
  fail_on_unrecognized_accession: true

  # ── Step 2 cell QC thresholds (GeneCompass-exact) ──
  preprocessing:
    min_genes_per_cell: 200
    min_cells_per_sample: 4
    max_mito_fraction: 0.15
    outlier_sd_threshold: 3.0
    min_core_genes_per_cell: 7
    save_qc_matrices: true

  # ── Step 3 expression-based pruning ──
  # GeneCompass architecture: biotype filtering (Step 1) + top-2048
  # ranking (Stage 5) are the real gene selectors. This step only
  # removes genes with zero expression in the entire QC'd corpus —
  # carrying extra genes through Stages 3-4 is cheap.
  pruning:
    min_cells_nonzero: 1           # Expressed in ≥1 QC'd cell

# ============================================================
# Stage 3: Ortholog Mapping — UPDATED CONFIG
# ============================================================
# Replace the existing 'orthologs:' section in pipeline_config.yaml
# with this block.
#
# KEY CHANGE: No identity thresholds.
# GeneCompass empirically used none (min observed: 1.2%).
# Ensembl's tree-based orthology inference IS the quality gate.
# ============================================================

orthologs:
  # Tier priority:
  #   T1  tri-species one2one → T2a human one2one → T2b mouse one2one →
  #   T3a human one2many/many2many → T3b mouse one2many/many2many →
  #   T4  new rat token
  #
  # GeneCompass empirically used: 89.6% one2one, 7.9% one2many, 2.4% many2many
  # with NO identity threshold (min observed: 1.2%)

  # Orthology types accepted per tier level
  one2one_types:
    - ortholog_one2one

  multi_types:
    - ortholog_one2many
    - ortholog_many2many

  # No identity threshold — Ensembl tree-based inference is the quality gate.
  # This key is retained for documentation only; the script ignores it.
  identity_threshold: null

  # For one2many / many2many disambiguation: pick ortholog with highest % identity
  disambiguation: highest_identity

  # Biotypes eligible for new token assignment (Tier 4)
  new_token_biotypes:
    - protein_coding
    - lncRNA
    - miRNA

# ============================================================
# Stage 4: Gene Medians
# ============================================================
medians:
  method: sparse_vectorized
  min_nonzero_cells: 10

# ============================================================
# Stage 5: Reference Assembly & Corpus Export
# ============================================================
reference_assembly:
  cells_per_shard: 50000
  biotype_output_map:
    protein_coding: protein_coding
    lncrna: lncRNA                 # GeneCompass paper includes lncRNA in core gene list
    mirna: miRNA

  # Per-cell gene ranking for GeneCompass tokenization.
  # GeneCompass paper: "a sequence of 2048 genes for each cell sample,
  # with each sequence obtained according to the corresponding ranked
  # high expression."
  # Consumed by Stage 5 (corpus export), NOT by Step 1 (cell QC).
  top_n_genes: 2048

  # MoTrPAC exclusion list (data leakage prevention)
  exclude_studies:
    - "GSE242354"   # MoTrPAC Endurance Exercise Training Study


# ============================================================
# Stage 6: Prior Knowledge Embeddings
# ============================================================
prior_knowledge:

  # Step 1: Co-expression embedding
  coexp:
    pcc_threshold: 0.8          # GeneCompass exact
    n_sample_cells: 3000        # GeneCompass exact
    min_shared_cells: 10        # Methodological addition (guard sparse data)
    min_expr_ratio: 0.05        # Methodological addition (pre-filter)
    chunk_size: 2000            # Memory management
    vector_size: 768
    window: 1
    sg: 1                       # Skip-gram
    epochs: 30
    workers: 8

  # Step 2: Gene family embedding
  gene_family:
    min_family_size: 2          # GeneCompass exact
    vector_size: 768
    window: 1
    sg: 1
    epochs: 30
    workers: 8
    rat_only_tokens: true       # Only embed rat-specific tokens (T4); 
                                # ortholog-mapped tokens inherit from GC

  # Steps 3 & 4: Promoter and GRN — stubs, not yet implemented
  promoter:
    enabled: true             # Requires DNABert + Ensembl genome sequences
  grn:
    enabled: true   # PECA2vec cross-species transfer from GeneCompass human/mouse GRNs