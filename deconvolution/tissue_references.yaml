# Canonical MoTrPAC tissue -> deconvolution reference map (single source of truth).  SCHEMA v3 (2026-07-15).
#
# WHY v3: the reference selection was re-decided per Geyu's note (deconvolution/REFERENCE_SELECTION_PLAN.md).
# This file now fully SPECIFIES each reference build (study + tissue + organism/arm/title filters + sample_ids)
# AND locks the EXACT selection it must produce (`expect:`), so the pipeline can VALIDATE that every build picks
# precisely the samples we intend BEFORE deconvolving -- the guard against the class of bug that let a ~85%-
# non-rat cortex reference and a rat-mouse-chimera muscle reference reach production.
#
# CONSUMED BY:
#   deconvolution/validate_selection.py         -- asserts each build's selection == expect (run BEFORE deconv)
#   deconvolution/build_references_from_config.py -- builds every reference from this spec
#   pipeline/run_deconv_all.py                  -- validate -> (build) -> reference_qc -> Stage 8/9 per tissue
#   pipeline/run_stage14.py                     -- reproduces the production build for the mechanism stage
#
# PER-TISSUE KEYS:
#   status         ready | needs-build | needs-online-data | proposed | blocked
#   reference_dir  where the built reference lives / will live (references_v3/*)
#   study, tissue  accession + tissue_normalized (exact) passed to build_reference.py
#   organism       geo_organism gate (default "Rattus norvegicus"; the keystone fix)
#   conditions     condition_resolved arm filter (control/young arm) | null
#   title_include / title_exclude   geo_title regex (arms that live only in the title: Ma -Y, GSE248413 Y)
#   sample_ids     explicit pin | null (take everything that survives the filters)
#   dedup_gsm      collapse duplicate GSMs (the _RAW double-ingest) -- default true
#   label_scheme   none | brain | muscle | lung ;  gene_join inner|outer ; min_gene_cells
#   allow_nonnative  bypass the reference_qc FAIL gate when a sort/isolation is INTRINSIC + intended (SPLEEN)
#   expect         the VALIDATION contract: n_samples, sample_ids (post-QC, exact), qc_dropped (intended drops), organism
#   build          the exact reproducible command
# Restrictions cross-checked against deconvolution/StudyDescriptions.docx (2026-07-15).
version: v3-2026-07-15

