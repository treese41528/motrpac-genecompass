model:
  base_checkpoint: vendor/GeneCompass/pretrained_models/GeneCompass_Base
  init_checkpoint: data/models/rat_genecompass_init
  vocab_size: 55275        # was 53032
  num_species: 3
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072
  max_position_embeddings: 2048

data:
  token_dict_path: data/training/ortholog_mappings/rat_human_mouse_tokens.pickle
  dataset_directory: data/training/tokenized_corpus/dataset
  stage6_dir: data/training/prior_knowledge
  homologous_gene_path: vendor/GeneCompass/prior_knowledge/homologous_hm_token.pickle
  # Mixed-species datasets (for Phase 2)
  human_dataset: vendor/GeneCompass/data/randsel_500w_human
  mouse_dataset: vendor/GeneCompass/data/randsel_500w_mouse
  mixed_dataset: data/training/mixed_species_dataset

phase1:
  freeze_encoder: true
  max_learning_rate: 1.0e-04
  train_batch_size_per_gpu: 16
  num_train_epochs: 1
  dataset_directory: data/training/mixed_species_dataset
  use_mixed_species: true
  warmup_steps: 1000
  lr_scheduler_type: linear
  run_name: rat_phase1_freeze_mixed
  # NOTE: species_ratios are documentation only. The actual ratios
  # are baked into the pre-built mixed dataset (40/45/15).
  species_ratios:
    rat: 0.40
    human: 0.45
    mouse: 0.15

phase2:
  freeze_encoder: false
  max_learning_rate: 1.0e-05
  train_batch_size_per_gpu: 14
  num_train_epochs: 1
  warmup_steps: 2000
  lr_scheduler_type: linear
  init_checkpoint: data/models/rat_genecompass_finetuned/models/rat_phase1_freeze_mixed/checkpoint-129449
  # Mixed-species training
  use_mixed_species: true
  dataset_directory: data/training/mixed_species_dataset
  run_name: rat_phase2_mixed_species
  # NOTE: species_ratios are documentation only. The actual ratios
  # are baked into the pre-built mixed dataset (40/45/15).
  species_ratios:
    rat: 0.40
    human: 0.45
    mouse: 0.15

training:
  weight_decay: 0.01
  fp16: true
  gradient_checkpointing: true
  emb_warmup_steps: 10000

initialization:
  t4_word_emb_init: random
  t4_word_emb_std: 0.02
  t3_warm_start: true          # NEW: clone from ortholog
  t3_noise_std: 0.001          # NEW: symmetry-breaking noise
  species_init: mouse_plus_noise
  species_noise_std: 0.02
  coexp_rescale_factor: 3.9

logging:
  logging_steps: 50
  save_strategy: steps
  save_steps: 10000
  save_total_limit: 5
  wandb_project: motrpac-genecompass-rat

output:
  output_directory: data/models/rat_genecompass_finetuned

distributed:
  nproc_per_node: 4
  nnodes: 1